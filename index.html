<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Loja</title>
<style>
body{font-family:Arial;margin:0;background:#fff}
header{background:orange;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:bold;display:flex;gap:10px}
.login-icon{font-size:22px;cursor:pointer}
.container{padding:20px;max-width:1000px;margin:auto}
.produtos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{border:1px solid #ddd;border-radius:10px;padding:15px;text-align:center}
.preco{color:orange;font-weight:bold}
img{width:100%;height:150px;object-fit:cover}
.cart-btn{position:fixed;right:20px;bottom:20px;background:orange;color:#fff;border-radius:999px;padding:12px;cursor:pointer}
.cart-box{position:fixed;bottom:80px;right:20px;background:#fff;border:1px solid #ddd;padding:10px;width:250px;display:none}
.item{display:flex;justify-content:space-between;font-size:14px}
.admin-exit{position:fixed;top:80px;right:20px;background:red;color:#fff;padding:8px;border:none;cursor:pointer;border-radius:6px}
</style>
</head>
<body>
<header id="logo">
<div class="logo">🛍️ MR Loja</div>
<div class="login-icon" onclick="loginGoogle()">👤</div>
</header>

<button id="sairAdmin" class="admin-exit" style="display:none" onclick="logout()">Sair</button>

<div class="container">
<div class="produtos" id="listaProdutos"></div>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="total">0</span></div>
<div class="cart-box" id="cartBox"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyAvaF-ppTlCkglojighky9LtsUoanZS_kI",authDomain:"mr-loja-4545.firebaseapp.com",projectId:"mr-loja-4545"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let user=null;
let carrinho=[];
let admin=false;

window.loginGoogle=async()=>{await signInWithPopup(auth,provider)}
window.logout=async()=>{await signOut(auth);admin=false;document.getElementById('sairAdmin').style.display='none'}

onAuthStateChanged(auth,u=>{
user=u;
if(u&&admin){document.getElementById('sairAdmin').style.display='block'}
});

let clicks=0;
document.getElementById('logo').addEventListener('click',()=>{
clicks++;
if(clicks===10){admin=true;loginGoogle();clicks=0}
setTimeout(()=>clicks=0,1500);
});

window.addCarrinho=(nome,preco)=>{
const item=carrinho.find(p=>p.nome===nome);
if(item){item.qtd++}else{carrinho.push({nome,preco:Number(preco),qtd:1})}
renderCart();
}

window.removerItem=nome=>{carrinho=carrinho.filter(p=>p.nome!==nome);renderCart()}
window.aumentar=nome=>{const item=carrinho.find(p=>p.nome===nome);item.qtd++;renderCart()}

function renderCart(){
const box=document.getElementById('cartBox');
let total=0;
box.innerHTML='';

carrinho.forEach(p=>{
total+=p.preco*p.qtd;
box.innerHTML+=`<div class="item">${p.nome} x${p.qtd}<div><button onclick="aumentar('${p.nome}')">+</button><button onclick="removerItem('${p.nome}')">x</button></div></div>`;
});

box.innerHTML+=`<hr>Total: R$ ${total.toFixed(2)}<br><button onclick="finalizar()">Finalizar</button>`;

document.getElementById('total').innerText=total.toFixed(2);
}

window.toggleCart=()=>{
const box=document.getElementById('cartBox');
box.style.display=box.style.display==='block'?'none':'block';
}

window.finalizar=()=>{
if(!user)return alert('Faça login');
let msg=`Cliente: ${user.displayName}\nEmail: ${user.email}\n\nPedido:\n`;
let total=0;

carrinho.forEach(p=>{
msg+=`- ${p.nome} x${p.qtd}\n`;
total+=p.preco*p.qtd;
});

msg+=`\nTotal: R$ ${total.toFixed(2)}\n\n`;

const numero='557194160171';
window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

onSnapshot(collection(db,"produtos"),snap=>{
const lista=document.getElementById('listaProdutos');
lista.innerHTML='';

snap.forEach(d=>{
const p=d.data();
const id=d.id;
lista.innerHTML+=`<div class="card"><img src="${p.imagem}"/><h4>${p.nome}</h4><p class="preco">R$ ${p.preco}</p><button onclick="addCarrinho('${p.nome}','${p.preco}')">Adicionar</button>${admin?`<button onclick="deleteDoc(doc(db,'produtos','${id}'))">Excluir</button>`:''}</div>`;
});
});
</script>
</body>
</html>
