<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Loja</title>
<style>
body{font-family:Arial;margin:0;background:#f9f9f9}
header{background:linear-gradient(90deg,#ff7a00,#ffb347);color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:bold;display:flex;gap:10px}
.login-icon{font-size:22px;cursor:pointer}
.container{padding:20px;max-width:1000px;margin:auto}
.produtos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{border:none;border-radius:12px;padding:15px;text-align:center;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
.preco{color:#ff7a00;font-weight:bold}
img{width:100%;height:150px;object-fit:cover;border-radius:8px}
button{background:#ff7a00;color:#fff;border:none;padding:8px;border-radius:6px;margin-top:5px}
button:hover{background:#e56700}
.cart-btn{position:fixed;right:20px;bottom:20px;background:#ff7a00;color:#fff;border-radius:999px;padding:14px;cursor:pointer;font-weight:bold}
.cart-box{position:fixed;bottom:80px;right:20px;background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);padding:10px;width:260px;display:none}
.item{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px}
.admin-exit{position:fixed;top:80px;right:20px;background:red;color:#fff;padding:8px;border:none;cursor:pointer;border-radius:6px}
.admin-box{background:#fff;padding:10px;margin-bottom:15px;border-radius:10px;display:none;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
input{width:100%;margin:5px 0;padding:8px;border-radius:6px;border:1px solid #ddd}
</style>
</head>
<body>
<header id="logo">
<div class="logo">🚗 MR Loja</div>
<div class="login-icon" onclick="loginGoogle()">👤</div>
</header>

<button id="sairAdmin" class="admin-exit" style="display:none" onclick="logout()">Sair</button>

<div class="container">

<div id="adminBox" class="admin-box">
<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="URL da imagem">
<button onclick="addProduto()">Adicionar Produto</button>
</div>

<div class="produtos" id="listaProdutos"></div>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒 R$ <span id="total">0</span></div>
<div class="cart-box" id="cartBox"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyAvaF-ppTlCkglojighky9LtsUoanZS_kI",authDomain:"mr-loja-4545.firebaseapp.com",projectId:"mr-loja-4545"};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let user=null;
let carrinho=[];
let admin=false;
let liberar=false;

const EMAIL_ADMIN=["lojamr.auto@gmail.com","arthurfigueiredo017@gmail.com"];

window.loginGoogle=async()=>{await signInWithPopup(auth,provider)}
window.logout=async()=>{await signOut(auth);admin=false;liberar=false;updateUI()}

onAuthStateChanged(auth,u=>{
user=u;
admin=u&&liberar&&EMAIL_ADMIN.includes(u.email.toLowerCase());
updateUI();
});

let clicks=0;
document.getElementById('logo').addEventListener('click',()=>{
clicks++;
if(clicks===5){liberar=true;loginGoogle();clicks=0}
setTimeout(()=>clicks=0,1500);
});

function updateUI(){
document.getElementById('adminBox').style.display=admin?'block':'none';
document.getElementById('sairAdmin').style.display=admin?'block':'none';renderProdutos();
}

window.addProduto=async()=>{
if(!admin)return;
const nome=document.getElementById('nome').value.trim();
const preco=Number(document.getElementById('preco').value);
const imagem=document.getElementById('imagem').value.trim();
if(!nome||!preco||!imagem)return;
await addDoc(collection(db,'produtos'),{nome,preco,imagem});
document.getElementById('nome').value='';
document.getElementById('preco').value='';
document.getElementById('imagem').value='';
}

window.excluirProduto=async(id)=>{if(admin)await deleteDoc(doc(db,'produtos',id))}

window.addCarrinho=(nome,preco)=>{
const item=carrinho.find(p=>p.nome===nome);
if(item){item.qtd++}else{carrinho.push({nome,preco:Number(preco),qtd:1})}
renderCart();
}

function renderCart(){
const box=document.getElementById('cartBox');
let total=0;box.innerHTML='';

carrinho.forEach(p=>{
total+=p.preco*p.qtd;
box.innerHTML+=`<div class="item">${p.nome} x${p.qtd}</div>`;
});

box.innerHTML+=`<hr>Total: R$ ${total.toFixed(2)}<br><button onclick="finalizar()">Finalizar</button>`;

document.getElementById('total').innerText=total.toFixed(2);
}

window.toggleCart=()=>{
const box=document.getElementById('cartBox');
box.style.display=box.style.display==='block'?'none':'block';
}

window.finalizar=()=>{
if(!user)return;
let msg=`Cliente: ${user.displayName}\nEmail: ${user.email}\n\nPedido:\n`;
let total=0;

carrinho.forEach(p=>{msg+=`- ${p.nome} x${p.qtd}\n`;total+=p.preco*p.qtd});
msg+=`\nTotal: R$ ${total.toFixed(2)}`;

window.open(`https://wa.me/5571991813374?text=${encodeURIComponent(msg)}`);
}

let produtosCache=[];

function renderProdutos(){
const lista=document.getElementById('listaProdutos');
lista.innerHTML='';
produtosCache.forEach(p=>{
lista.innerHTML+=`<div class="card"><img src="${p.imagem}"><h4>${p.nome}</h4><p class="preco">R$ ${p.preco}</p><button onclick="addCarrinho('${p.nome}','${p.preco}')">Adicionar</button>${admin?`<button onclick="excluirProduto('${p.id}')">Excluir</button>`:''}</div>`;
});
}

onSnapshot(collection(db,'produtos'),snap=>{
produtosCache=[];
snap.forEach(d=>produtosCache.push({...d.data(),id:d.id}));
renderProdutos();
});
</script>
</body>
</html>
