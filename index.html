<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Loja</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#020617;border-bottom:3px solid orange}
.logo{font-size:26px;color:#3b82f6;cursor:pointer}
.login{cursor:pointer;font-size:20px}

.container{padding:20px;max-width:1000px;margin:auto}

.produtos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}

.card{background:#1e293b;padding:15px;border-radius:10px;text-align:center}
.card img{width:100%;height:140px;object-fit:cover;border-radius:6px}

.preco{color:orange;font-weight:bold}

button{background:#3b82f6;color:#fff;border:none;padding:8px;border-radius:6px;margin-top:5px;cursor:pointer}

.admin-box{display:none;background:#1e293b;padding:10px;border-radius:10px;margin-bottom:15px}
input{width:100%;padding:8px;margin:5px 0;border:none;border-radius:5px}

.cart{position:fixed;bottom:20px;right:20px;background:orange;color:#000;padding:12px;border-radius:999px;cursor:pointer}
.cartBox{position:fixed;bottom:80px;right:20px;background:#1e293b;padding:10px;border-radius:10px;width:250px;display:none}
</style>
</head>

<body>

<header id="logo">
<div class="logo">🚗 MR Loja</div>
<div class="login" onclick="loginGoogle()">👤</div>
</header>

<div class="container">

<div id="adminBox" class="admin-box">
<input id="nomeInput" placeholder="Nome">
<input id="precoInput" placeholder="Preço">
<input id="imagemInput" placeholder="Imagem URL">
<button onclick="addProduto()">Adicionar</button>
</div>

<div id="lista" class="produtos"></div>

</div>

<div class="cart" onclick="toggleCart()">🛒 R$ <span id="total">0.00</span></div>
<div id="cartBox" class="cartBox"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyAvaF-ppTlCkglojighky9LtsUoanZS_kI",
authDomain:"mr-loja-4545.firebaseapp.com",
projectId:"mr-loja-4545"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

const ADM_EMAILS=[
"lojamr.auto@gmail.com",
"arthurfigueiredo017@gmail.com"
];

let user=null;
let admin=false;
let liberar=false;
let produtos=[];
let carrinho=[];

window.loginGoogle=()=>signInWithPopup(auth,provider);

onAuthStateChanged(auth,(u)=>{
user=u;

if(!u){admin=false;update();return;}

const email=u.email.toLowerCase();

if(!liberar){admin=false;update();return;}

if(!ADM_EMAILS.includes(email)){
alert("Acesso negado");
admin=false;
return;
}

admin=true;
update();
});

let clicks=0;
document.getElementById("logo").onclick=()=>{
clicks++;
if(clicks===5){
liberar=true;
loginGoogle();
clicks=0;
}
setTimeout(()=>clicks=0,1500);
};

function update(){
document.getElementById("adminBox").style.display=admin?"block":"none";
render();
}

window.addProduto=async()=>{
if(!admin)return;

const nome=nomeInput.value.trim();
const preco=Number(precoInput.value);
const imagem=imagemInput.value.trim();

if(!nome||!preco||!imagem)return alert("Preencha tudo");

await addDoc(collection(db,"produtos"),{nome,preco,imagem});

nomeInput.value="";
precoInput.value="";
imagemInput.value="";
};

window.excluir=async(id)=>{
if(!admin)return;
await deleteDoc(doc(db,"produtos",id));
};

window.addCarrinho=(nome,preco)=>{
const item=carrinho.find(p=>p.nome===nome);

if(item){
item.qtd++;
}else{
carrinho.push({nome,preco:Number(preco),qtd:1});
}

renderCart();
};

function renderCart(){
const box=document.getElementById("cartBox");
const totalEl=document.getElementById("total");

let total=0;

box.innerHTML="";

carrinho.forEach(p=>{
total+=p.preco*p.qtd;

box.innerHTML+=`
<div style="display:flex;justify-content:space-between">
<span>${p.nome} x${p.qtd}</span>
<span>R$ ${(p.preco*p.qtd).toFixed(2)}</span>
</div>`;
});

box.innerHTML+=`
<hr>
<b>Total: R$ ${total.toFixed(2)}</b><br>
<button onclick="finalizar()">Finalizar</button>
`;

totalEl.innerText=total.toFixed(2);
}

window.toggleCart=()=>{
cartBox.style.display=cartBox.style.display==="block"?"none":"block";
};

window.finalizar=()=>{
if(!user)return alert("Faça login");

let msg=`Cliente: ${user.displayName}\n${user.email}\n\nPedido:\n`;
let total=0;

carrinho.forEach(p=>{
msg+=`- ${p.nome} x${p.qtd}\n`;
total+=p.preco*p.qtd;
});

msg+=`\nTotal: R$ ${total.toFixed(2)}`;

window.open(`https://wa.me/5571991813374?text=${encodeURIComponent(msg)}`);
};

function render(){
const lista=document.getElementById("lista");
lista.innerHTML="";

produtos.forEach(p=>{
lista.innerHTML+=`
<div class="card">
<img src="${p.imagem}">
<h4>${p.nome}</h4>
<p class="preco">R$ ${p.preco}</p>
<button onclick="addCarrinho('${p.nome}','${p.preco}')">Comprar</button>
${admin?`<button onclick="excluir('${p.id}')">Excluir</button>`:""}
</div>`;
});
}

onSnapshot(collection(db,"produtos"),(snap)=>{
produtos=[];
snap.forEach(d=>produtos.push({...d.data(),id:d.id}));
render();
});
</script>

</body>
</html>
